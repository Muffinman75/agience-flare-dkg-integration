name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e "package[dev]"

      - name: Run unit tests
        run: pytest package/tests/unit -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e "package[dev]"
      - name: Dependency audit
        run: pip audit
        continue-on-error: true
      - name: Verify no install scripts
        run: |
          python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('package/pyproject.toml').read_text())
          scripts = data.get('tool', {}).get('setuptools', {})
          assert 'cmdclass' not in scripts, 'No custom install commands allowed'
          print('No postinstall/preinstall scripts found')
          "

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build package/
      - name: Verify wheel
        run: |
          pip install package/dist/*.whl
          agience-dkg --help
          python -c "from agience_dkg_integration import DkgHttpClient; print('Import OK')"
